version: v2
plugins:
  - remote: buf.build/bufbuild/es:v2.2.3
    out: src/gen/ts
    opt:
      - target=ts
      - import_extension=js
inputs:
  - directory: ../../proto
    paths:
      - ../../proto/google/rpc/error_details.proto
      - ../../proto/common/v1/kv.proto
      - ../../proto/store/v1/compact.proto
      - ../../proto/log/v1/ingest.proto
      - ../../proto/store/v1/query.proto
      - ../../proto/log/v1/stream.proto
  - module: buf.build/bufbuild/protovalidate:80ab13bee0bf4272b6161a72bf7034e0
    paths:
      - buf/validate/validate.proto
