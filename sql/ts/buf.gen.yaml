version: v2
plugins:
  - remote: buf.build/bufbuild/es:v2.2.3
    out: src/generated/proto
    opt:
      - target=ts
      - import_extension=js
inputs:
  - directory: ../../proto
    paths:
      - ../../proto/sql/v1/common.proto
      - ../../proto/sql/v1/schema.proto
      - ../../proto/sql/v1/query.proto
      - ../../proto/sql/v1/stream.proto
      - ../../proto/sql/v1/service.proto
  - module: buf.build/bufbuild/protovalidate
    paths:
      - buf/validate/validate.proto
