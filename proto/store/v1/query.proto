syntax = "proto3";

package store.query.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "store/v1/common.proto";

// --- Query wire types ---

// Visible store sequence number plus server-defined metadata for query RPCs. On
// success, carried in the typed response body; also attached as a `google.rpc`
// error detail when the RPC fails (same message shape in both cases).
message Detail {
  // Store sequence number at which the query was evaluated. Clients can reuse
  // this as `min_sequence_number` on later reads to preserve monotonic
  // read-after-write/session consistency.
  uint64 sequence_number = 1;
  // Optional server-defined metadata. The built-in server leaves this empty.
  map<string, google.protobuf.Value> extra = 2;
}

// Default when `RangeRequest.mode` is unset (proto3 implicit enum).
enum TraversalMode {
  TRAVERSAL_MODE_FORWARD = 0;
  TRAVERSAL_MODE_REVERSE = 1;
}

// --- Range-reduction DSL (`Reduce`); mirrors `exoware_sdk::kv_codec` ---

// Scalar type of a field extracted from a stored key or value.
enum KvFieldKind {
  KV_FIELD_KIND_INT64 = 0;
  KV_FIELD_KIND_UINT64 = 1;
  KV_FIELD_KIND_FLOAT64 = 2;
  KV_FIELD_KIND_BOOLEAN = 3;
  KV_FIELD_KIND_UTF8 = 4;
  // Days since Unix epoch.
  KV_FIELD_KIND_DATE32 = 5;
  // Milliseconds since Unix epoch.
  KV_FIELD_KIND_DATE64 = 6;
  // Microseconds since Unix epoch.
  KV_FIELD_KIND_TIMESTAMP = 7;
  // 16-byte little-endian decimal (Arrow Decimal128).
  KV_FIELD_KIND_DECIMAL128 = 8;
  // Fixed-width binary; length given by `fixed_size_binary_len`.
  KV_FIELD_KIND_FIXED_SIZE_BINARY = 9;
  // 32-byte little-endian decimal (Arrow Decimal256).
  KV_FIELD_KIND_DECIMAL256 = 10;
}

// Reference to a typed field inside a stored key or value. Used by KvExpr
// and KvPredicateCheck to locate the data to evaluate.
message KvFieldRef {
  // A field extracted from the key bytes at a fixed bit offset.
  message KeyField {
    // Bit offset into the key payload where this field starts.
    uint32 bit_offset = 1;
    // Scalar type used to decode the field bytes.
    KvFieldKind kind = 2;
    // Length in bytes when `kind` is `FIXED_SIZE_BINARY`; ignored otherwise.
    uint32 fixed_size_binary_len = 3;
  }

  // A field extracted from a Z-order (Morton) interleaved key. The field
  // is de-interleaved from the composite key using the position and widths.
  message ZOrderKeyField {
    // Bit offset into the key payload where the Z-order block starts.
    uint32 bit_offset = 1;
    // Zero-based position of this dimension within the Z-order interleaving.
    uint32 field_position = 2;
    // Bit widths of each dimension in the Z-order curve, in order.
    repeated uint32 field_widths = 3;
    // Scalar type used to decode the de-interleaved value.
    KvFieldKind kind = 4;
    // Length in bytes when `kind` is `FIXED_SIZE_BINARY`; ignored otherwise.
    uint32 fixed_size_binary_len = 5;
  }

  // A field extracted from the stored value (the encoded `StoredRow`).
  message ValueField {
    // Zero-based column index within the `StoredRow`.
    uint32 index = 1;
    // Scalar type of this column.
    KvFieldKind kind = 2;
    // Whether the column is nullable. When true, a missing value yields NULL
    // rather than an error.
    bool nullable = 3;
    // Length in bytes when `kind` is `FIXED_SIZE_BINARY`; ignored otherwise.
    uint32 fixed_size_binary_len = 4;
  }

  oneof field {
    // Field decoded from raw key bytes.
    KeyField key = 1;
    // Field decoded from a Z-order key.
    ZOrderKeyField z_order_key = 2;
    // Field decoded from stored value bytes.
    ValueField value = 3;
  }
}

// A single scalar value produced by reduction or used as a literal in
// expressions. The variant must match the `KvFieldKind` of the expression
// it participates in.
message KvReducedValue {
  oneof value {
    // Signed 64-bit integer.
    int64 int64_value = 1;
    // Unsigned 64-bit integer.
    uint64 uint64_value = 2;
    // 64-bit floating-point number.
    double float64_value = 3;
    // Boolean value.
    bool boolean_value = 4;
    // UTF-8 string.
    string utf8_value = 5;
    // DATE32 days since Unix epoch.
    int32 date32_value = 6;
    // DATE64 milliseconds since Unix epoch.
    int64 date64_value = 7;
    // TIMESTAMP microseconds since Unix epoch.
    int64 timestamp_value = 8;
    // Raw Decimal128 bytes.
    bytes decimal128_value = 9;
    // Raw fixed-size binary bytes.
    bytes fixed_size_binary_value = 10;
    // Raw Decimal256 bytes.
    bytes decimal256_value = 11;
  }
}

// An expression tree evaluated per row during reduction. Leaf nodes are field
// references or literal values; interior nodes are arithmetic or transform
// operations.
message KvExpr {
  // Binary arithmetic operation on two sub-expressions.
  message BinaryExpr {
    // Left operand.
    KvExpr left = 1;
    // Right operand.
    KvExpr right = 2;
  }

  oneof expr {
    // Read a field from the key or value.
    KvFieldRef field = 1;
    // A constant scalar value.
    KvReducedValue literal = 2;
    // Addition (both operands must be the same numeric kind).
    BinaryExpr add = 3;
    // Subtraction.
    BinaryExpr sub = 4;
    // Multiplication.
    BinaryExpr mul = 5;
    // Division.
    BinaryExpr div = 6;
    // Convert a UTF-8 string to lowercase.
    KvExpr lower = 7;
    // Truncate a DATE32/DATE64/TIMESTAMP to the start of its day.
    KvExpr date_trunc_day = 8;
  }
}

// A constraint applied to a single field value during predicate evaluation.
// Exactly one variant must be set.
message KvPredicateConstraint {
  // Inclusive integer range. Omit `min` or `max` for a one-sided bound.
  message IntRange {
    // Inclusive lower bound.
    optional int64 min = 1;
    // Inclusive upper bound.
    optional int64 max = 2;
  }

  // Inclusive uint64 range. Omit `min` or `max` for a one-sided bound.
  message UInt64Range {
    // Inclusive lower bound.
    optional uint64 min = 1;
    // Inclusive upper bound.
    optional uint64 max = 2;
  }

  // A single bound for a float range, with an inclusivity flag.
  message FloatBound {
    // Numeric bound value.
    double value = 1;
    // When true the bound includes `value` itself (<=/>= semantics).
    bool inclusive = 2;
  }

  // Float range with independently inclusive/exclusive bounds.
  message FloatRange {
    // Lower bound.
    optional FloatBound min = 1;
    // Upper bound.
    optional FloatBound max = 2;
  }

  // Inclusive Decimal128 range (16-byte little-endian).
  message Decimal128Range {
    // Inclusive lower bound.
    optional bytes min = 1;
    // Inclusive upper bound.
    optional bytes max = 2;
  }

  // Inclusive Decimal256 range (32-byte little-endian).
  message Decimal256Range {
    // Inclusive lower bound.
    optional bytes min = 1;
    // Inclusive upper bound.
    optional bytes max = 2;
  }

  // Set membership test for UTF-8 strings.
  message StringIn {
    // Allowed strings.
    repeated string values = 1;
  }

  // Set membership test for int64 values.
  message IntIn {
    // Allowed int64 values.
    repeated int64 values = 1;
  }

  // Set membership test for uint64 values.
  message UInt64In {
    // Allowed uint64 values.
    repeated uint64 values = 1;
  }

  // Set membership test for fixed-size binary values.
  message FixedSizeBinaryIn {
    // Allowed fixed-size binary values.
    repeated bytes values = 1;
  }

  oneof constraint {
    // Exact UTF-8 string equality.
    string string_eq = 1;
    // Exact boolean equality.
    bool bool_eq = 2;
    // Exact fixed-size binary equality.
    bytes fixed_size_binary_eq = 3;
    // Inclusive int64 range.
    IntRange int_range = 4;
    // Inclusive uint64 range.
    UInt64Range uint64_range = 5;
    // Float range with per-bound inclusivity.
    FloatRange float_range = 6;
    // Inclusive Decimal128 range.
    Decimal128Range decimal128_range = 7;
    // True if the field must be NULL.
    bool is_null = 8;
    // True if the field must be non-NULL.
    bool is_not_null = 9;
    // UTF-8 set membership.
    StringIn string_in = 10;
    // Int64 set membership.
    IntIn int_in = 11;
    // UInt64 set membership.
    UInt64In uint64_in = 12;
    // Fixed-size binary set membership.
    FixedSizeBinaryIn fixed_size_binary_in = 13;
    // Inclusive Decimal256 range.
    Decimal256Range decimal256_range = 14;
  }
}

// A single predicate check: extract the field, then test it against the
// constraint.
message KvPredicateCheck {
  // The field to extract from each row.
  KvFieldRef field = 1;
  // The constraint the field value must satisfy.
  KvPredicateConstraint constraint = 2;
}

// Conjunction (AND) of predicate checks used to filter rows before reduction.
message KvPredicate {
  // All checks must pass for a row to be included.
  repeated KvPredicateCheck checks = 1;
  // When true, the predicate is statically unsatisfiable and the server may
  // short-circuit evaluation (returns zero rows).
  bool contradiction = 2;
}

// Aggregation operation applied by a reducer.
enum RangeReduceOp {
  // Count every row (ignores `expr`; `expr` must not be set).
  RANGE_REDUCE_OP_COUNT_ALL = 0;
  // Count rows where `expr` evaluates to a non-NULL value.
  RANGE_REDUCE_OP_COUNT_FIELD = 1;
  // Sum of `expr` across rows (numeric types only).
  RANGE_REDUCE_OP_SUM_FIELD = 2;
  // Minimum value of `expr` across rows.
  RANGE_REDUCE_OP_MIN_FIELD = 3;
  // Maximum value of `expr` across rows.
  RANGE_REDUCE_OP_MAX_FIELD = 4;
}

// A single aggregation to compute over the scanned range.
message RangeReducerSpec {
  // The aggregation operation.
  RangeReduceOp op = 1;
  // Expression to evaluate per row. Required for all ops except
  // `COUNT_ALL` (where it must be absent).
  optional KvExpr expr = 2;
}

// Parameters for a Reduce RPC: what to aggregate, how to group, and an
// optional row filter.
message ReduceParams {
  // Aggregations to compute. At least one reducer or one `group_by`
  // expression is required.
  repeated RangeReducerSpec reducers = 1;
  // Expressions whose values partition rows into groups. When non-empty,
  // results are returned per-group in `ReduceResponse.groups` instead of as
  // flat scalar results.
  repeated KvExpr group_by = 2;
  // Optional predicate to exclude rows before aggregation.
  optional KvPredicate filter = 3;
}

// The result of a single reducer. Absent when no rows contributed (e.g. SUM
// over zero matching rows).
message RangeReduceResult {
  // Reducer output when rows contributed.
  optional KvReducedValue value = 1;
}

// Aggregation results for one distinct combination of group-by values.
message RangeReduceGroup {
  // The evaluated group-by expression values for this group, in the same
  // order as `ReduceParams.group_by`.
  repeated KvReducedValue group_values = 1;
  // Parallel to `group_values`; false when the corresponding group value is
  // NULL (the proto value is a default zero, but should be treated as absent).
  repeated bool group_values_present = 2;
  // Reducer results for this group, in the same order as
  // `ReduceParams.reducers`.
  repeated RangeReduceResult results = 3;
}

// --- Service ---
//
// All query RPCs accept an optional `min_sequence_number` freshness gate.
// If set, the server rejects the query with ABORTED unless its current
// sequence number is >= the requested value. This ensures the response
// reflects at least all writes up through that batch but does not filter
// the data returned. Clients typically set this to the sequence number
// from a prior Put response to get read-after-write consistency.

service Service {
  // Point lookup of a single key.
  rpc Get(GetRequest) returns (GetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Batch point lookup of multiple keys, streamed back in frames.
  rpc GetMany(GetManyRequest) returns (stream GetManyFrame) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Lexicographic range scan, streamed back in batched frames.
  rpc Range(RangeRequest) returns (stream RangeFrame) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Server-side aggregation over a key range with optional grouping and
  // filtering.
  rpc Reduce(ReduceRequest) returns (ReduceResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// Point lookup request for a single key.
message GetRequest {
  // The key to look up (max 254 bytes).
  bytes key = 1 [(buf.validate.field).bytes.max_len = 254];
  // Optional freshness gate. See service-level comment.
  optional uint64 min_sequence_number = 2;
}

// Point lookup response.
message GetResponse {
  reserved 1;
  // The value associated with the key; absent when the key does not exist.
  optional bytes value = 2;
  // Query sequence and read counters for this lookup.
  Detail detail = 3;
}

// GetMany performs batch point lookups. Results stream back as frames, each
// containing one or more entries. Each entry includes its key so results may
// arrive in any order. Missing keys have `value` absent.
message GetManyRequest {
  // Keys to look up.
  repeated bytes keys = 1 [(buf.validate.field).repeated = {min_items: 1, items: {bytes: {max_len: 254}}}];
  // Optional freshness gate. See service-level comment.
  optional uint64 min_sequence_number = 2;
  // Requested maximum lookup results per response frame. Servers may apply a
  // lower cap.
  uint32 batch_size = 3 [(buf.validate.field).uint32.gt = 0];
}

// A single entry in a GetMany response frame.
message GetManyEntry {
  // The looked-up key.
  bytes key = 1;
  // The value if the key exists; absent for missing keys.
  optional bytes value = 2;
}

// A batch of GetMany lookup results.
message GetManyFrame {
  // Lookup results in this frame.
  repeated GetManyEntry results = 1;
  // Running query detail after the entries in this frame have been read. For a
  // successful stream, the last detail observed by the client is the final
  // sequence/read-counter summary.
  Detail detail = 2;
}

// Range reads keys in lexicographic order over raw `bytes` keys.
//
// Keys satisfy `start <= key <= end` when `end` is non-empty (inclusive upper
// bound). When `end` is empty, the upper bound is unbounded (all keys
// `>= start`). For prefix scans, pass the lexicographic maximum key of the
// prefix as `end`, or use an empty `end` when scanning through the end of the
// keyspace is intended.
message RangeRequest {
  // Inclusive lower bound.
  bytes start = 1 [(buf.validate.field).bytes.max_len = 254];
  // Empty means unbounded above.
  bytes end = 2 [(buf.validate.field).bytes.max_len = 254];
  // Maximum rows to return. Unset means no explicit row limit.
  optional uint32 limit = 3;
  // Requested maximum rows per response frame. Servers may apply a lower cap.
  uint32 batch_size = 4 [(buf.validate.field).uint32.gt = 0];
  // Traversal direction. Defaults to forward when unset.
  TraversalMode mode = 5 [(buf.validate.field).enum.defined_only = true];
  // Optional freshness gate. See service-level comment.
  optional uint64 min_sequence_number = 6;
}

// Each stream message is a batch of rows plus running query detail after the
// rows in that frame have been read. For an empty result, the stream contains a
// single frame with empty `results` and populated `detail`.
message RangeFrame {
  // Rows in this frame.
  repeated store.common.v1.KvEntry results = 1;
  // Running query detail after the rows in this frame have been read. For a
  // successful stream, the last detail observed by the client is the final
  // sequence/read-counter summary.
  Detail detail = 2;
}

// Same key-range semantics as `RangeRequest`: inclusive `[start, end]` over raw bytes when `end` is
// non-empty; empty `end` means unbounded above.
message ReduceRequest {
  // Inclusive lower bound.
  bytes start = 1 [(buf.validate.field).bytes.max_len = 254];
  // Empty means unbounded above.
  bytes end = 2 [(buf.validate.field).bytes.max_len = 254];
  // Aggregation parameters.
  ReduceParams params = 3 [(buf.validate.field).required = true];
  // Optional freshness gate. See service-level comment.
  optional uint64 min_sequence_number = 4;
}

// Response from a Reduce RPC. Exactly one of `results` or `groups` is
// populated depending on whether `ReduceParams.group_by` was empty.
message ReduceResponse {
  // Scalar reducer results (one per `ReduceParams.reducers` entry). Populated
  // only when `group_by` is empty.
  repeated RangeReduceResult results = 1;
  // Per-group reducer results. Populated only when `group_by` is non-empty.
  repeated RangeReduceGroup groups = 2;
  // Query sequence and read counters for this reduction.
  Detail detail = 3;
}
