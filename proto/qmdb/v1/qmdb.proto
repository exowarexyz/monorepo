syntax = "proto3";

package qmdb.v1;

import "buf/validate/validate.proto";
import "store/v1/common.proto";

// Current key lookup service for QMDB backends that can authenticate explicit
// logical-key lookups.
//
// `GetMany` makes no ordering claim beyond preserving request order among
// returned results. Ordered QMDB returns hit or miss proofs for requested keys.
// Unordered QMDB returns only verifiable hits; missing keys are omitted because
// that variant has no exclusion proof.
service KeyLookupService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc GetMany(GetManyRequest) returns (GetManyResponse);
}

// Ordered current key-range service. Only ordered QMDB backends can prove a
// contiguous logical-key interval because they maintain adjacent `next_key`
// links and exclusion proofs.
service OrderedKeyRangeService {
  rpc GetRange(GetRangeRequest) returns (GetRangeResponse);
}

// Historical operation-log proof service over a QMDB backend.
//
// Clients dial the endpoint bound to the backend variant they want to read
// (ordered, unordered, immutable, or keyless). The wire protocol is identical
// across all four.
//
// With `match_keys` set, only batches touching a matched logical key produce
// a proof (ordered/unordered/immutable). With `match_keys` empty, every
// batch produces a proof covering all of its operations; keyless backends
// require `match_keys` to be empty.
service OperationLogService {
  rpc GetOperationRange(GetOperationRangeRequest) returns (GetOperationRangeResponse);
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);
}

// Current operation proof service for QMDB backends that upload current-state
// boundary material. Ordered and unordered backends can expose this when the
// requested tip is an uploaded batch boundary.
service CurrentOperationService {
  rpc GetCurrentOperationRange(GetCurrentOperationRangeRequest) returns (GetCurrentOperationRangeResponse);
}

// Subscribe to operations whose logical key and/or value match the given
// filters.
//
// An operation is included when it satisfies every non-empty filter list.
// OR semantics within a list (any member may match); AND semantics across
// the two lists (if both are specified, key AND value must match). Leaving
// both empty emits a proof for every batch (required for keyless backends,
// which have no logical key).
message SubscribeRequest {
  // Filters applied to each operation's decoded logical key.
  repeated store.common.v1.BytesFilter key_filters = 1
    [(buf.validate.field).repeated.max_items = 1024];

  // Filters applied to each operation's decoded value bytes. Operations
  // without a value (e.g. deletes, commits) never match a value filter.
  repeated store.common.v1.BytesFilter value_filters = 2
    [(buf.validate.field).repeated.max_items = 1024];

  // Resume cursor over the underlying store batch log. Use
  // `SubscribeResponse.resume_sequence_number + 1` to resume after a
  // disconnect.
  optional uint64 since_sequence_number = 3;
}

// Current key proof request.
message GetRequest {
  // Raw logical QMDB key (`K::as_ref()` bytes), not a store row key.
  bytes key = 1;

  // Published ordered-QMDB batch-boundary to prove against. The client must
  // already know the trusted current/global root for this tip.
  uint64 tip = 2;
}

// Current key proof request for one or more logical keys.
message GetManyRequest {
  // Raw logical QMDB keys (`K::as_ref()` bytes), not store row keys.
  repeated bytes keys = 1
    [(buf.validate.field).repeated.min_items = 1,
     (buf.validate.field).repeated.max_items = 1024];

  // Published QMDB batch-boundary to prove against. The client must already
  // know the trusted current/global root for this tip.
  uint64 tip = 2;
}

// Current ordered key range proof request. The range is half-open:
// `start_key <= key < end_key` when `end_key` is set; otherwise it scans to the
// end of the ordered keyspace. `limit` must be non-zero.
message GetRangeRequest {
  bytes start_key = 1;
  optional bytes end_key = 2;
  uint32 limit = 3 [(buf.validate.field).uint32.gt = 0];
  uint64 tip = 4;
}

// One historical operation proven by a multi-proof.
message MultiProofOperation {
  uint64 location = 1;
  bytes encoded_operation = 2;
}

// Historical QMDB multi-proof over a set of operation locations.
message HistoricalMultiProof {
  bytes proof = 1;
  repeated MultiProofOperation operations = 2;
  // Optional opaque Commonware `current::proof::OpsRootWitness` bytes. When
  // present, `ops_root` is first authenticated against the caller's trusted
  // current/global root, then `proof` is verified against that ops root.
  bytes ops_root = 3;
  bytes ops_root_witness = 4;
}

// Historical QMDB range proof over a contiguous operation interval.
message HistoricalOperationRangeProof {
  bytes proof = 1;
  uint64 start_location = 2;
  repeated bytes encoded_operations = 3;
  // Optional opaque Commonware `current::proof::OpsRootWitness` bytes. When
  // present, `ops_root` is first authenticated against the caller's trusted
  // current/global root, then `proof` is verified against that ops root.
  bytes ops_root = 4;
  bytes ops_root_witness = 5;
}

// Current QMDB operation range proof. `proof` is opaque Commonware
// `current::proof::RangeProof` bytes encoded with `commonware-codec`.
// `encoded_operations` are the contiguous operations starting at
// `start_location`; `chunks` are the raw bitmap chunks required by Commonware
// verification.
message CurrentOperationRangeProof {
  bytes proof = 1;
  uint64 start_location = 2;
  repeated bytes encoded_operations = 3;
  repeated bytes chunks = 4;
}

// Current proof for one active key. `proof` is opaque Commonware proof bytes
// encoded with `commonware-codec`: ordered endpoints use
// `current::ordered::db::KeyValueProof`; unordered endpoints use
// `current::proof::OperationProof`.
message CurrentKeyValueProof {
  bytes proof = 1;
  bytes encoded_operation = 2;
}

// Current ordered proof that one logical key is inactive. `proof` is opaque
// Commonware `current::ordered::ExclusionProof` encoded with
// `commonware-codec`.
message CurrentKeyExclusionProof {
  bytes proof = 1;
}

message CurrentKeyLookupResult {
  bytes key = 1;
  oneof result {
    CurrentKeyValueProof hit = 2;
    CurrentKeyExclusionProof miss = 3;
  }
}

message CurrentKeyRangeEntry {
  bytes key = 1;
  CurrentKeyValueProof proof = 2;
}

// One emitted proof for a subscribed batch.
message SubscribeResponse {
  // Underlying store stream sequence that made this proof readable end-to-end.
  uint64 resume_sequence_number = 1;
  HistoricalMultiProof proof = 2;
  // Published operation-log watermark this proof verifies against. When
  // `proof.ops_root_witness` is present, clients verify using their trusted
  // current/global root for this tip; otherwise they verify against the
  // backend's operation-log root.
  uint64 tip = 3;
}

// Unary operation-log range proof request. The proof covers
// `[start_location, min(start_location + max_locations, tip + 1))`.
message GetOperationRangeRequest {
  uint64 tip = 1;
  uint64 start_location = 2;
  uint32 max_locations = 3 [(buf.validate.field).uint32.gt = 0];
}

message GetOperationRangeResponse {
  HistoricalOperationRangeProof proof = 1;
}

// Unary current operation-range proof request. The proof covers
// `[start_location, min(start_location + max_locations, tip + 1))` in the
// current-state tree at `tip`.
message GetCurrentOperationRangeRequest {
  uint64 tip = 1;
  uint64 start_location = 2;
  uint32 max_locations = 3 [(buf.validate.field).uint32.gt = 0];
}

message GetCurrentOperationRangeResponse {
  CurrentOperationRangeProof proof = 1;
}

// Unary current key proof response.
message GetResponse {
  CurrentKeyValueProof proof = 1;
}

// Unary current many-key proof response.
message GetManyResponse {
  repeated CurrentKeyLookupResult results = 1;
}

// Ordered current key-range proof response. `start_proof`, when present,
// authenticates the boundary before the first returned key (or the entire empty
// range). `end_proof`, when present, authenticates the exclusive end boundary.
message GetRangeResponse {
  repeated CurrentKeyRangeEntry entries = 1;
  optional CurrentKeyExclusionProof start_proof = 2;
  optional CurrentKeyExclusionProof end_proof = 3;
  bool has_more = 4;
  bytes next_start_key = 5;
}
