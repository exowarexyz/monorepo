[workspace]
members = [
    "server",
    "sdk-rs",
    "simulator",
    "qmdb",
    "sql",
]
resolver = "2"

[workspace.dependencies]
exoware-sdk-rs = { version = "0.0.2", path = "sdk-rs" }
# Schemas: `proto/`. Rust bindings are embedded in `sdk-rs`; TS bindings live under
# `sdk-ts/src/gen/ts/` (see `gen/README.md`).
exoware-server = { path = "server" }
tokio = "1.43.0"
clap = "4.5.18"
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
thiserror = "2.0.12"
axum = "0.8.1"
base64 = "0.22.1"
hex = "0.4"
regex = "1"
commonware-codec = "2026.3.0"
rocksdb = "0.22.0"
rand = "0.8.5"
bincode = "1.3.3"
dashmap = "5.5.3"
tokio-stream = "0.1.15"
futures = "0.3.30"
reqwest = "0.12.5"
tokio-tungstenite = "0.23.1"
url = "2.5.2"
futures-util = "0.3.30"
serde = "1.0.219"
serde_json = "1.0.120"
serde_with = { version = "3.14.0" }
tempfile = "3.10.1"
portpicker = "0.1.1"
http = "1.3.1"
tower-http = "0.5.2"
bytes = "1"
connectrpc = { version = "0.3.1", features = ["client", "axum"] }
hyper = { version = "1", features = ["full"] }
buffa = { version = "0.3", features = ["json"] }
buffa-types = { version = "0.3", features = ["json"] }
http-body-util = "0.1"
tower = { version = "0.5", features = ["util"] }
anyhow = "1"
async-trait = "0.1"
criterion = { version = "0.5", features = ["html_reports"] }

[profile.bench]
overflow-checks = true

[profile.dev]
overflow-checks = true

[profile.release]
overflow-checks = true

[profile.release-with-debug]
inherits = "release"
debug = true

[profile.test]
overflow-checks = true
