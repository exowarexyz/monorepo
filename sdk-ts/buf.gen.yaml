version: v2
plugins:
  - remote: buf.build/bufbuild/es:v2.2.3
    out: src/gen/ts
    opt:
      - target=ts
inputs:
  - directory: ../proto
    paths:
      - ../proto/google/rpc/error_details.proto
      - ../proto/store/v1/common.proto
      - ../proto/store/v1/compact.proto
      - ../proto/store/v1/ingest.proto
      - ../proto/store/v1/query.proto
      - ../proto/store/v1/stream.proto
  - module: buf.build/bufbuild/protovalidate
    paths:
      - buf/validate/validate.proto
