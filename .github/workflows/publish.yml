name: Publish

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  All:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run setup
      uses: ./.github/actions/setup
    - name: Publish exoware-common
      run: cargo publish --manifest-path common/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish exoware-server
      run: cargo publish --manifest-path server/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish sdk-rs
      run: cargo publish --manifest-path sdk-rs/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish simulator
      run: cargo publish --manifest-path simulator/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish exoware-qmdb
      run: cargo publish --manifest-path qmdb/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish exoware-sql
      run: cargo publish --manifest-path sql/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Install Buf CLI (sdk-ts prebuild runs buf generate)
      uses: bufbuild/buf-setup-action@v1
      with:
        version: 1.67.0
    - name: Publish sdk-ts
      run: |
        cd sdk-ts
        npm install
        npm publish
      continue-on-error: true
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}