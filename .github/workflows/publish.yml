name: Publish

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  All:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run setup
      uses: ./.github/actions/setup
    - name: Install Buf CLI
      uses: bufbuild/buf-setup-action@v1
      with:
        version: 1.67.0
    - name: Publish proto
      run: buf push
      env:
        BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
    - name: Publish exoware-sdk
      run: cargo publish --manifest-path sdk-rs/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish exoware-server
      run: cargo publish --manifest-path server/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish exoware-qmdb
      run: cargo publish --manifest-path qmdb/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish exoware-simulator
      run: cargo publish --manifest-path examples/simulator/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Publish exoware-sql
      run: cargo publish --manifest-path sql/Cargo.toml
      continue-on-error: true
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    - name: Install wasm32 target
      run: rustup target add wasm32-unknown-unknown
    - name: Install wasm-pack + wasm-bindgen-cli
      uses: taiki-e/install-action@v2
      with:
        tool: wasm-pack@0.13.1,wasm-bindgen-cli@0.2.117
    - name: Publish @exowarexyz/sdk
      run: |
        cd sdk-ts
        npm ci
        npm run build
        npm publish --access public --ignore-scripts
      continue-on-error: true
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    - name: Publish @exowarexyz/qmdb
      run: |
        cd qmdb/ts
        npm ci
        npm run build
        cd ../..
        node .github/workflows/scripts/prepare-npm-publish.mjs qmdb/ts
        cd qmdb/ts
        npm publish --access public --ignore-scripts
      continue-on-error: true
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    - name: Publish @exowarexyz/sql
      run: |
        cd sql/ts
        npm ci
        npm run build
        cd ../..
        node .github/workflows/scripts/prepare-npm-publish.mjs sql/ts
        cd sql/ts
        npm publish --access public --ignore-scripts
      continue-on-error: true
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
