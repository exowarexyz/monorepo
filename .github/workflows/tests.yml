name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  UDEPS_VERSION: 0.1.57
  NIGHTLY_VERSION: nightly-2025-11-15

jobs:
  proto:
    name: Proto
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.67.0
      - name: Run setup (Rust + Node)
        uses: ./.github/actions/setup
      - name: Buf build
        run: buf build proto
      - name: Buf lint
        run: buf lint proto
      - name: Verify generated code is up to date
        run: |
          ./gen.sh
          git diff --exit-code sdk-rs/src/gen/ sdk-ts/src/gen/ || \
            (echo "Generated code is stale. Run ./gen.sh and commit." && exit 1)

  rust_lint:
    name: Rust / Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run setup
      uses: ./.github/actions/setup
    - name: Install nightly Rust toolchain
      run: rustup toolchain install ${{ env.NIGHTLY_VERSION }} && rustup component add --toolchain ${{ env.NIGHTLY_VERSION }} rustfmt
    - name: Lint
      run: cargo clippy --all-targets -- -D warnings
    - name: Fmt
      run: cargo +${{ env.NIGHTLY_VERSION }} fmt --all -- --check
    - name: Check docs
      run: cargo doc --no-deps --document-private-items
      env:
        RUSTDOCFLAGS: "-D warnings"

  rust_test:
    name: Rust / Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run setup
      uses: ./.github/actions/setup
    - name: Run tests
      run: cargo test --verbose

  rust_dependencies:
    name: Rust / Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install nightly Rust toolchain
      run: rustup toolchain install ${{ env.NIGHTLY_VERSION }}
    - name: Verify toolchain
      run: cargo +${{ env.NIGHTLY_VERSION }} --version && rustc +${{ env.NIGHTLY_VERSION }} --version
    - name: Run setup
      uses: ./.github/actions/setup
    - name: Install cargo-udeps
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-udeps@${{ env.UDEPS_VERSION }}
    - name: Check for unused dependencies
      run: cargo +${{ env.NIGHTLY_VERSION }} udeps --all-targets

  typescript_lint:
    name: TypeScript / Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run setup
        uses: ./.github/actions/setup
      - name: Install sdk-ts dependencies
        run: cd sdk-ts && npm ci
      - name: Lint sdk-ts
        run: cd sdk-ts && npm run lint
      - name: Install examples/sandbox dependencies
        run: cd examples/sandbox && npm install
      - name: Lint examples/sandbox
        run: cd examples/sandbox && npm run lint

  typescript_test:
    name: TypeScript / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run setup
        uses: ./.github/actions/setup
      - name: Install sdk-ts dependencies
        run: cd sdk-ts && npm ci
      - name: Test sdk-ts
        run: cd sdk-ts && npm test

  typescript_build:
    name: TypeScript / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run setup
        uses: ./.github/actions/setup
      - name: Install sdk-ts dependencies
        run: cd sdk-ts && npm ci
      - name: Build sdk-ts
        run: cd sdk-ts && npm run build

  scripts:
    name: Scripts
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run shellcheck
      run: shellcheck gen.sh
