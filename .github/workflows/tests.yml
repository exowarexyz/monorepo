name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  UDEPS_VERSION: 0.1.50
  NIGHTLY_TOOLCHAIN: nightly-2025-11-15

jobs:
  Proto:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.67.0
      - name: Run setup (Rust + Node)
        uses: ./.github/actions/setup
      - name: Buf build
        run: buf build proto
      - name: Buf lint
        run: buf lint proto
      - name: Verify generated code is up to date
        run: |
          ./gen.sh
          git diff --exit-code sdk-rs/src/gen/ sdk-ts/src/gen/ || \
            (echo "Generated code is stale. Run ./gen.sh and commit." && exit 1)

  Lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install nightly Rust toolchain
      run: rustup toolchain install ${{ env.NIGHTLY_TOOLCHAIN }} && rustup component add --toolchain ${{ env.NIGHTLY_TOOLCHAIN }} rustfmt
    - name: Run setup
      uses: ./.github/actions/setup
    - name: Lint
      run: cargo clippy --all-targets -- -D warnings
    - name: Fmt
      run: cargo +${{ env.NIGHTLY_TOOLCHAIN }} fmt --all -- --check
    - name: Check docs
      run: cargo doc --no-deps --document-private-items
      env:
        RUSTDOCFLAGS: "-D warnings"

  Rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run setup
      uses: ./.github/actions/setup
    - name: Run tests
      run: cargo test --verbose

  TypeScript:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run setup
        uses: ./.github/actions/setup
      - name: Install sdk-ts dependencies
        run: cd sdk-ts && npm install
      - name: Lint sdk-ts
        run: cd sdk-ts && npm run lint
      - name: Test sdk-ts
        run: cd sdk-ts && npm test
      - name: Build sdk-ts
        run: cd sdk-ts && npm run build
      - name: Install examples/sandbox dependencies
        run: cd examples/sandbox && npm install
      - name: Lint examples/sandbox
        run: cd examples/sandbox && npm run lint

  Dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install nightly Rust toolchain
      run: rustup toolchain install ${{ env.NIGHTLY_TOOLCHAIN }}
    - name: Get Rust version
      id: rust-version
      run: echo "rust_version=$(rustc +${{ env.NIGHTLY_TOOLCHAIN }} --version)" >> "$GITHUB_OUTPUT"
    - name: Run setup
      uses: ./.github/actions/setup
    - name: Cache cargo-udeps
      id: cargo-udeps-cache
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-udeps
        key: ${{ runner.os }}-${{ env.UDEPS_VERSION }}-cargo-udeps-${{ steps.rust-version.outputs.rust_version }}
    - name: Install cargo-udeps
      if: steps.cargo-udeps-cache.outputs.cache-hit != 'true'
      run: cargo +${{ env.NIGHTLY_TOOLCHAIN }} install cargo-udeps --version ${{ env.UDEPS_VERSION }}
    - name: Check for unused dependencies
      run: cargo +${{ env.NIGHTLY_TOOLCHAIN }} udeps --all-targets

  Scripts:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run shellcheck
      run: shellcheck gen.sh
